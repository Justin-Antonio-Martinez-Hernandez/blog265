<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Tide</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="inicio" class="card" style="display: block;">
        <h1>Quiz del Mejor Amigo</h1>
        <p>¿Qué tanto conoces el lore de Tide?</p>
        <input type="text" id="nombre" placeholder="Ingresa tu nombre para jugar">
        <button onclick="comenzar()">Comenzar Reto 🚀</button>
    </div>

    <div id="quiz" class="card" style="display: none;">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        
        <h2 id="pregunta"></h2>
        <div id="opciones"></div>
        
        <p id="error-msg" style="display: none; color: #ff2d55; font-weight: 600; margin-top: 10px;">¡Selecciona una opción primero!</p>
        
        <button onclick="siguiente()">Siguiente ➔</button>
    </div>

    <div id="final" class="card" style="display: none;">
        <h1 id="resultado"></h1>
        <h2 id="mensaje"></h2>
        
        <div class="screenshot-box" style="margin-bottom: 20px;">
            <p class="grande" style="font-size: 1.5rem; color: #ff2d55; font-weight: 800; margin: 15px 0;">📸 ¡Toma screenshot y envíaselo a tu amigo!</p>
        </div>

        <div id="apartado-crear" style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; text-align: left;">
            <h3 style="text-align: center; color: #6c63ff;">🎮 ¿Quieres tu propio Quiz?</h3>
            <p style="font-size: 0.9rem; color: #777; text-align: center; margin-bottom: 20px;">Mándame un mensaje con tus ideas o pega tus preguntas aquí y te armo uno.</p>
            
            <input type="text" id="crear-nombre" placeholder="Tu nombre o apodo" style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            <input type="text" id="crear-contacto" placeholder="Tu Instagram o WhatsApp para pasarte el link" style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            
            <textarea id="crear-ideas" placeholder="Escribe o pega aquí todas las preguntas y respuestas para tu quiz..." rows="5" style="width: 100%; padding: 15px; font-size: 16px; border: 2px solid #ddd; border-radius: 12px; margin-bottom: 20px; outline: none; font-family: 'Poppins', sans-serif; resize: vertical; box-sizing: border-box;"></textarea>
            
            <button id="btn-enviar-crear" onclick="enviarPeticionQuiz()" style="width: 100%;">¡Quiero mi Quiz! ✉️</button>
            <p id="crear-status" style="display: none; margin-top: 10px; font-weight: 600; text-align: center;"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
