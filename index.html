<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Tide</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="inicio" class="card">
        <h1>Quiz del Mejor Amigo</h1>
        <p>¿Qué tanto conoces el lore de Tide?</p>
        <input type="text" id="nombre" placeholder="Ingresa tu nombre para jugar">
        <button onclick="comenzar()">Comenzar Reto 🚀</button>
    </div>

    <div id="quiz" class="card" style="display: none;">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        
        <h2 id="pregunta"></h2>
        <div id="opciones"></div>
        
        <p id="error-msg" style="display: none; color: #ff2d55; font-weight: 600; margin-top: 15px;">¡Selecciona una opción primero!</p>
        
        <button onclick="siguiente()">Siguiente ➔</button>
    </div>

    <div id="final" class="card" style="display: none;">
        <h1 id="resultado"></h1>
        <h2 id="mensaje"></h2>
        
        <div class="screenshot-box">
            <p class="grande-aviso">📸 ¡Toma screenshot y envíaselo a tu amigo!</p>
        </div>

        <div id="apartado-crear">
            <h3>🎮 ¿Quieres tu propio Quiz?</h3>
            <p class="sub-crear">Mándame un mensaje con tus ideas o pega tus preguntas aquí y te armo uno.</p>
            
            <input type="text" id="crear-nombre" placeholder="Tu nombre o apodo">
            <input type="text" id="crear-contacto" placeholder="Tu Instagram o WhatsApp para pasarte el link">
            
            <textarea id="crear-ideas" placeholder="Escribe o pega aquí todas las preguntas y respuestas para tu quiz..." rows="5"></textarea>
            
            <button id="btn-enviar-crear" onclick="enviarPeticionQuiz()">¡Quiero mi Quiz! ✉️</button>
            <p id="crear-status" style="display: none; font-weight: 600; margin-top: 10px;"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
